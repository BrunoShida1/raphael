<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raphael Almeida</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a1f44, #1e3c72);
            color: white;
        }
        
        /* MENU TOPO */
        
        nav{
            width: 100%;
            background: #ffcc00;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .logo{
            font-size: 28px;
            font-weight: bold;
            color: #000;
            letter-spacing: 2px;
        }
        
        .menu-topo{
            display: flex;
            gap: 25px;
        }
        
        .menu-topo a{
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            padding: 8px 14px;
            border-radius: 8px;
        }
        
        .menu-topo a:hover{
            background: #000;
            color: #ffcc00;
        }
        
        /* HEADER */
        
        header{
            text-align: center;
            padding: 40px 20px;
        }
        
        header h1{
            font-size: 45px;
            margin-bottom: 10px;
        }
        
        header p{
            font-size: 18px;
            opacity: 0.9;
        }
        
        /* CARDS */
        
        .menu{
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 40px;
            gap: 25px;
        }
        
        .card{
            width: 200px;
            height: 260px;
            background: white;
            color: black;
            border-radius: 15px;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        .card:hover{
            transform: scale(1.08);
            box-shadow: 0 12px 25px rgba(0,0,0,0.6);
        }
        
        .card img{
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        
        .card h3{
            margin-top: 12px;
            font-size: 22px;
        }
        
        .card p{
            margin-top: 8px;
            color: #555;
        }
        
        /* EFEITO FIGURINHA */
        
        .card::before{
            content: "";
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            pointer-events: none;
        }
        
        /* FOOTER */
        
        footer{
            background: #000;
            text-align: center;
            padding: 18px;
            margin-top: 20px;
        }
        
        </style>
</head>
<body>
    <div class="container">
        <nav>

            <div class="logo">
                COPA 2026 ⚽
            </div>
        
            <div class="menu-topo">
                <a href="#">Início</a>
                <a href="#">Seleções</a>
                <a href="#">Jogadores</a>
                <a href="#">Estádios</a>
                <a href="#">Minha Coleção</a>
            </div>
        
        </nav>
        
        <!-- HEADER -->
        
        <header>
            <h1>Álbum Oficial da Copa 2026</h1>
            <p>Colecione as figurinhas das maiores seleções do mundo</p>
        </header>
        
        <!-- CARDS -->
        
        <div class="menu">
        
            <div class="card">
                <img src="https://via.placeholder.com/200x150" alt="">
                <h3>Brasil</h3>
                <p>Seleção Brasileira</p>
            </div>
        
            <div class="card">
                <img src="https://via.placeholder.com/200x150" alt="">
                <h3>Argentina</h3>
                <p>Atual campeã</p>
            </div>
        
            <div class="card">
                <img src="https://via.placeholder.com/200x150" alt="">
                <h3>França</h3>
                <p>Craques mundiais</p>
            </div>
        
            <div class="card">
                <img src="https://via.placeholder.com/200x150" alt="">
                <h3>Portugal</h3>
                <p>Seleção europeia</p>
            </div>
        
        </div>
        <footer>
            <p>Raphael Almeida</p>
        </footer>
    </div>
</body>
</html>
